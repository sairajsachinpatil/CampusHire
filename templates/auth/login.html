{% extends "base.html" %}

{% block content %}

<style>

    .login-container{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(to bottom right,#ffffff,#f5f7fa);
        padding:30px;
    }

    .login-card{
        width:100%;
        max-width:450px;
        border:none;
        border-radius:24px;
        padding:40px 35px;
        background:white;
        box-shadow:
        0 10px 40px rgba(0,0,0,0.08),
        0 2px 10px rgba(0,0,0,0.03);
        animation:fadeIn 0.8s ease;
    }

    .login-title{
        font-size:38px;
        font-weight:700;
        color:#111827;
    }

    .login-subtitle{
        color:#6B7280;
        font-size:20px;
    }

    .form-label{
        font-weight:600;
        color:#374151;
    }

    .form-control{
        height:52px;
        border-radius:12px;
        border:1px solid #d1d5db;
        padding-left:15px;
        font-size:15px;
        transition:0.3s;
    }

    .form-control:focus{
        border-color:#63a5f6;
        box-shadow:0 0 0 0.15rem rgba(37,99,235,0.15);
    }

    .login-btn{
        background:#111827;
        color:white;
        border:none;
        height:52px;
        border-radius:12px;
        font-size:17px;
        font-weight:600;
        transition:0.3s ease;
    }

    .login-btn:hover{
        background:#2563EB;
        transform:translateY(-2px);
    }

    .register-link{
        color:#2563EB;
        text-decoration:none;
        font-weight:600;
        transition:0.3s;
    }

    .register-link:hover{
        color:#1D4ED8;
        text-decoration:underline;
    }

    @keyframes fadeIn{

        from{
            opacity:0;
            transform:translateY(20px);
        }

        to{
            opacity:1;
            transform:translateY(0);
        }

    }

</style>

<div class="login-container">

    <div class="login-card">

        <h2 class="text-center mb-3 login-title">
            Welcome back to Placement Portal
        </h2>

        <p class="text-center mb-4 login-subtitle">
            Please login to continue.
        </p>

        <form action="/login" method="POST">

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required
                >

            </div>

            <!-- PASSWORD -->

            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter password"
                    required
                >

            </div>

            <!-- LOGIN BUTTON -->

            <button
                type="submit"
                class="btn login-btn w-100"
            >

                Login

            </button>

        </form>

        <!-- REGISTER LINKS -->

        <div class="text-center mt-4">

            <p class="mb-2">
                New Student?
                <a href="/signup" class="register-link">
                    Register Here
                </a>
            </p>

            <p>
                Company Registration?
                <a href="/company/register" class="register-link">
                    Register Company
                </a>
            </p>

        </div>

    </div>

</div>

{% endblock %}
