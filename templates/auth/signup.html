{% extends "base.html" %}

{% block content %}

<style>

    .signup-container{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(to bottom right,#ffffff,#f5f7fa);
        padding:30px;
        animation:fadePage 0.8s ease;
    }

    .signup-card{
        width:100%;
        max-width:500px;
        border:none;
        border-radius:24px;
        padding:40px 35px;
        background:white;
        box-shadow:
        0 10px 40px rgba(0,0,0,0.08),
        0 2px 10px rgba(0,0,0,0.03);

        animation:slideUp 1s ease;
    }

    .signup-title{
        font-size:38px;
        font-weight:700;
        color:#111827;
    }

    .signup-subtitle{
        color:#6B7280;
        font-size:18px;
    }

    .form-label{
        font-weight:600;
        color:#374151;
    }

    .form-control{
        height:52px;
        border-radius:12px;
        border:1px solid #d1d5db;
        padding-left:15px;
        font-size:15px;
        transition:0.3s;
    }

    .form-control:focus{
        border-color:#63a5f6;
        box-shadow:0 0 0 0.15rem rgba(37,99,235,0.15);
    }

    .signup-btn{
        background:#111827;
        color:white;
        border:none;
        height:52px;
        border-radius:12px;
        font-size:17px;
        font-weight:600;
        transition:0.3s ease;
    }

    .signup-btn:hover{
        background:#2563EB;
        transform:translateY(-2px);
        box-shadow:0 10px 20px rgba(37,99,235,0.25);
    }

    .login-link{
        color:#2563EB;
        text-decoration:none;
        font-weight:600;
        transition:0.3s;
    }

    .login-link:hover{
        color:#1D4ED8;
        text-decoration:underline;
    }

    @keyframes slideUp{

        from{
            opacity:0;
            transform:translateY(30px);
        }

        to{
            opacity:1;
            transform:translateY(0);
        }

    }

    @keyframes fadePage{

        from{
            opacity:0;
        }

        to{
            opacity:1;
        }

    }

</style>

<div class="signup-container">

    <div class="signup-card">

        <h2 class="text-center mb-3 signup-title">
            Student Signup
        </h2>

        <p class="text-center signup-subtitle mb-4">
            Create your Placement Portal account
        </p>

        <form action="/signup" method="POST">

            <!-- FULL NAME -->

            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    name="fullname"
                    class="form-control"
                    placeholder="Enter your full name"
                    required
                >

            </div>

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required
                >

            </div>

            <!-- PASSWORD -->

            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Create password"
                    required
                >

            </div>

            <!-- SUBMIT BUTTON -->

            <button
                type="submit"
                class="btn signup-btn w-100"
            >

                Create Account

            </button>

        </form>

        <!-- LOGIN LINK -->

        <div class="text-center mt-4">

            <p>
                Already have an account?

                <a href="/login" class="login-link">
                    Login
                </a>
            </p>

        </div>

    </div>

</div>

{% endblock %}
