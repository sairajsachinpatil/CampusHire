{% extends "base.html" %}

{% block content %}

<style>

    body{
        background:#F5F7FB;
    }

    /* NAVBAR */

    .top-navbar{
        background:white;
        border-bottom:1px solid #E5E7EB;
    }

    /* SIDEBAR */

    .sidebar{
        background:#1E293B;
        position:sticky;
        top:20px;
        margin:20px;
        border-radius:20px;
        height:fit-content;
    }

    .sidebar .btn{
        border:none;
        color:#E2E8F0;
        background:transparent;
        padding:12px 15px;
        border-radius:12px;
        font-weight:500;
        transition:0.3s;
    }

    .sidebar .btn:hover{
        background:#2563EB;
        color:white;
    }

    .active-link{
        background:#2563EB !important;
        color:white !important;
    }
    .readonly-field{

        background-color: #dfe3e8 !important;
        border: 1px solid #c7ccd1 !important;

        cursor: not-allowed;

        opacity: 0.95;

    }
    /* CARDS */

    .card{
        border:none;
        border-radius:20px;
        box-shadow:0 4px 15px rgba(0,0,0,0.05);
    }

    /* LABELS */

    .form-label{
        font-weight:600;
        color:#374151;
    }

</style>



<div class="container-fluid p-0">

    <!-- NAVBAR -->

    <nav class="navbar top-navbar px-4 py-3">

        <div class="container-fluid">

            <div>

                <h5 class="fw-bold mb-1">

                    <script>

                        const today = new Date();

                        document.write(

                            today.toLocaleDateString(
                                "en-US",
                                {
                                    weekday:"short",
                                    month:"short",
                                    day:"numeric",
                                    year:"numeric"
                                }

                            ).replace(",", " |")

                        );

                    </script>

                </h5>

            </div>

            <div>

                <a href="/logout"
                   class="btn btn-danger rounded-pill px-4">

                    Logout

                </a>

            </div>

        </div>

    </nav>



    <!-- MAIN LAYOUT -->

    <div class="row g-0">

        <!-- SIDEBAR -->

        <div class="col-lg-2">

            <div class="sidebar p-3">

                <div class="d-grid gap-2">

                    <a href="/student/dashboard"
                       class="btn text-start">

                        Dashboard

                    </a>

                    <a href="/my-profile"
                       class="btn text-start active-link">

                        My Profile

                    </a>

                    <a href="/available-drives"
                       class="btn text-start">

                        Available Drives

                    </a>

                    <a href="/my-applications"
                       class="btn text-start">

                        My Applications

                    </a>


                    <a href="/issues-queries"
                       class="btn text-start">

                        Issues & Queries

                    </a>

                </div>

            </div>

        </div>



        <!-- MAIN CONTENT -->

        <div class="col-lg-10 p-4">

            <div class="card">

                <div class="card-body p-5">

                    <h3 class="fw-bold mb-4">
                        My Profile
                    </h3>

                    <form method="POST" enctype="multipart/form-data">

                        <div class="row">

                            <!-- FULL NAME -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text"
                                       name="fullname"
                                       class="form-control"
                                       value="{{ student.fullname }}"
                                       readonly>

                            </div>


                            <!-- EMAIL -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input type="email"
                                       class="form-control"
                                       value="{{ student.email }}"
                                       readonly>

                            </div>

                        </div>



                        <div class="row">

                            <!-- PHONE -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input type="text"
                                       name="phone"
                                       class="form-control"
                                       value="{{ student.phone }}">

                            </div>


                            <!-- PRN -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">
                                    PRN / Roll Number
                                </label>

                                <input type="text"
                                       name="prn"
                                       class="form-control"
                                       value="{{ student.prn }}">

                            </div>

                        </div>



                        <div class="row">

                            <!-- DEPARTMENT -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">
                                    Department
                                </label>

                                <input type="text"
                                       name="department"
                                       class="form-control"
                                       value="{{ student.department }}">

                            </div>


                            <!-- YEAR -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">
                                    Current Year
                                </label>

                                <input type="text"
                                       name="year"
                                       class="form-control"
                                       value="{{ student.year }}">

                            </div>

                        </div>



                        <div class="row">

                            <!-- CGPA -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">
                                    CGPA
                                </label>

                                <input type="number"
                                       step="0.01"
                                       name="cgpa"
                                       class="form-control"
                                       value="{{ student.cgpa }}">

                            </div>

                        </div>


                        <!-- SKILLS -->

                        <div class="mb-4">

                            <label class="form-label">
                                Skills
                            </label>

                            <textarea name="skills"
                                      rows="4"
                                      class="form-control">{{ student.skills }}</textarea>

                        </div>

                        <!-- RESUME -->

                        <div class="mb-4">

                            <label class="form-label">
                                Resume
                            </label>

                            <div class="d-flex align-items-center gap-3 flex-wrap">

                                <!-- VIEW RESUME -->

                                {% if student.resume %}

                                <a href="{{ url_for(
                                    'static',
                                    filename='uploads/resumes/' + student.resume
                                ) }}"
                                target="_blank"
                                class="btn btn-outline-dark rounded-pill">

                                    View Resume

                                </a>

                                {% else %}

                                <span class="text-muted">
                                    No Resume Uploaded
                                </span>

                                {% endif %}


                                <!-- UPLOAD BUTTON -->

                                <button type="button"
                                        class="btn btn-primary rounded-pill"
                                        onclick="showResumeUpload()">

                                    Upload New Resume

                                </button>

                            </div>


                            <!-- HIDDEN FILE INPUT -->

                            <div class="mt-3 d-none"
                                id="resumeUploadSection">

                                <input type="file"
                                    name="resume"
                                    class="form-control"
                                    accept=".pdf">

                            </div>

                        </div>

                        <!-- SAVE BUTTON -->

                        <div class="text-end d-none"
                            id="saveButton">

                            <button type="submit"
                                    class="btn btn-success px-5 rounded-pill">

                                Save Changes

                            </button>

                        </div>
                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

    <script>

        // SHOW SAVE BUTTON
        // WHEN ANY FIELD CHANGES

        const fields = document.querySelectorAll(

            "input, textarea, select"

        );

        fields.forEach(field => {

            field.addEventListener(

                "input",

                function(){

                    document
                        .getElementById("saveButton")
                        .classList.remove("d-none");

                }

            );

        });


        // SHOW RESUME SECTION

        function showResumeUpload(){

            document
                .getElementById("resumeUploadSection")
                .classList.remove("d-none");

            document
                .getElementById("saveButton")
                .classList.remove("d-none");

        }

    </script>

{% endblock %}
