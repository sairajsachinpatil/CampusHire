<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:white;
            color:black;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .hero-section{
            text-align:center;
            max-width:700px;
            padding:40px;
        }

        .hero-section h1{
            font-size:80px;
            font-weight:bold;
            color:black;
            margin-bottom:20px;
            letter-spacing:1px;
        }

        .subtitle{
            font-size:30px;
            font-weight: bold;
            color:#0c61ff;
            margin-bottom:25px;
            font-weight:300;
        }

        .description{
            font-size:18px;
            color:#666;
            font-weight: 300;
            line-height:1.7;
            margin-bottom:40px;
        }

        .start-btn{
            background:black;
            color:white;
            border:none;
            padding:15px 40px;
            font-size:18px;
            font-weight:bold;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s ease;
        }

        .start-btn:hover{
            background:#2563EB;
            transform:scale(1.05);
        }

    </style>

</head>
<body>

    <div class="hero-section">

        <h1>Placement Portal</h1>

        <p class="subtitle">
            Fast. Secure. Organized.
        </p>

        <p class="description">
            Manage campus placements, applications, and recruitment
            from one centralized platform.
        </p>
         
        <!--Button Route To Login Page-->
        <a href="/login">
            <button class="start-btn">
                Get Started
            </button>
        </a>

    </div>

</body>
</html>
